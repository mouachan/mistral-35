{{- if .Values.grafana.enabled }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: {{ include "mistral.fullname" . }}-prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "mistral.labels" . | nindent 4 }}
spec:
  instanceSelector:
    matchLabels:
      dashboards: {{ include "mistral.fullname" . }}-grafana
  datasource:
    name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: {{ .Values.grafana.datasource.url }}
    isDefault: true
    jsonData:
      httpHeaderName1: Authorization
      timeInterval: 30s
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: "Bearer {{ .Values.grafana.datasource.token }}"
    editable: true
{{- end }}
