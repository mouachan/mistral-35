{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mistral.fullname" . }}-grafana-prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "mistral.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mistral.fullname" . }}-grafana-monitoring
  labels:
    {{- include "mistral.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
- kind: ServiceAccount
  name: {{ include "mistral.fullname" . }}-grafana-prometheus
  namespace: {{ .Values.namespace }}
{{- end }}
