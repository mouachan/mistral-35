# -------------------------------------------------------------------
# Tenant namespace RBAC for EvalHub
# -------------------------------------------------------------------
# Apply this in each tenant namespace where EvalHub should run
# benchmark jobs. Replace TENANT_NAMESPACE with the actual namespace.
# -------------------------------------------------------------------

# --- Label the namespace as a tenant ---
# oc label namespace TENANT_NAMESPACE \
#   evalhub.trustyai.opendatahub.io/tenant="true" \
#   opendatahub.io/dashboard="true"

# --- RoleBinding: allow EvalHub job SA to create resources ---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: evalhub-jobs-edit
  namespace: TENANT_NAMESPACE
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: evalhub-redhat-ods-applications-job
  namespace: TENANT_NAMESPACE
